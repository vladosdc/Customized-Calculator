<!-- !-- Сообщаем браузеру как стоит обрабатывать эту страницу -->
<!DOCTYPE html>
<!-- Оболочка документа, указываем язык содержимого -->
<html lang="ru">
	<!-- Заголовок страницы, контейнер для других важных данных (не отображается) -->
	<head>
		<!-- Заголовок страницы в браузере -->
		<title>Калькулятор</title>
		<!-- Подключаем CSS -->
		<link rel="stylesheet" href="css/style.css">
		<!-- Кодировка страницы -->
		<meta charset="UTF-8">
		<!-- Адаптив -->
		<meta name="viewport" content="width=device-width initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	</head>
	<!-- Отображаемое тело страницы -->
	<body>
	<main>
		<div class="wrapper">
		<h1 class="title">Калькулятор (version - 1.0)</h1>
		<div class="calculator">
			<div class="flex_calc">
			<p>Число 1: <input type="text" id="number_one"></p>
			<p>Число 2: <input type="text" id="number_two"></p>
			<p>Результат: <input type="text" id="result"></p>
				<button class="look_result">Посчитать</button>
			</div>

		</div>

		</div>
	</main>

		<script src="js/script.js"></script>

	</body>
	</html>
